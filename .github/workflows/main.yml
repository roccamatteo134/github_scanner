name: AI Scout 
on:
  schedule:
    - cron: '0 9,21 * * *' # Gira due volte al giorno (ore 9 e 21)
  workflow_dispatch: # Per avviarlo tu quando vuoi
jobs:
  run-scout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python_version: '3.x'
      - run: pip install -r requirements.txt
      - run: python main.py
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      - name: Auto-update DB
        run: |
          git config --global user.name 'AI Scout Bot'
          git config --global user.email 'bot@noreply.github.com'
          
          # 1. Recupera le modifiche che hai fatto tu a mano (il reset del JSON)
          git fetch origin main
          git pull --rebase origin main
          
          # 2. Aggiungi il file aggiornato dallo script
          git add database_notifiche.json
          
          # 3. Commit solo se ci sono cambiamenti
          git commit -m "Update notified repos [skip ci]" || echo "No changes to commit"
          
          # 4. Spingi le modifiche
          git push origin main
