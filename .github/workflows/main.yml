name: AI Scout 
on:
  schedule:
    - cron: '0 6,12,18,0 * * *'
  workflow_dispatch: # Avvio manuale

jobs:
  run-scout:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run main script
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python main.py

      - name: Commit feed
        run: |
          git config --global user.name 'AI Scout Bot'
          git config --global user.email 'bot@noreply.github.com'
          git add feed.xml
          git rm --cached --ignore-unmatch database_notifiche.json
          if git diff --staged --quiet; then
            echo "Nessuna nuova repository trovata. Nulla da caricare."
          else
            git pull --rebase --autostash origin main
            git commit -m "Update feed.xml [skip ci]"
            git push origin main
          fi
