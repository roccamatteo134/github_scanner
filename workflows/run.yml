name: AI Scout
on:
  schedule:
    - cron: '0 9,21 * * *' # Gira due volte al giorno (ore 9 e 21)
  workflow_dispatch: # Per avviarlo tu quando vuoi
jobs:
  run-scout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python_version: '3.x'
      - run: pip install -r requirements.txt
      - run: python main.py
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      - name: Auto-update DB
        run: |
          git config --global user.name 'AI Scout Bot'
          git config --global user.email 'bot@noreply.github.com'
          git add database_notifiche.json
          git commit -m "Aggiorna database notifiche" || exit 0
          git push
